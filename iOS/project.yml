name: CanningLog
options:
  bundleIdPrefix: com.shimondeitel.canning
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CanningLog:
    type: application
    platform: iOS
    sources:
      - path: CanningLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.canning
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CanningLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CanningLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CanningLogTests
      - path: CanningLog.storekit
    dependencies:
      - target: CanningLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.canning.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CanningLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CanningLogUITests
    dependencies:
      - target: CanningLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.canning.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CanningLog:
    build:
      targets:
        CanningLog: all
        CanningLogTests: [test]
        CanningLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CanningLog.storekit
    test:
      config: Debug
      storeKitConfiguration: CanningLog.storekit
      targets:
        - CanningLogTests
        - CanningLogUITests
    archive:
      config: Release
